services:
  
  postgres-crypto:
    image: postgres:16
    container_name: pg_crypto
    environment:
      POSTGRES_DB: ${CRYPTO_DBNAME:-db_crypto}
      POSTGRES_USER: ${CRYPTO_USER:-postgres}
      POSTGRES_PASSWORD: ${CRYPTO_PASSWORD:-postgres}
    ports:
      - "5434:5432"
    volumes:
      - crypto_data:/var/lib/postgresql/data
      - ./db_init/crypto:/docker-entrypoint-initdb.d:ro
    command: >
      postgres 
      -c wal_level=logical 
      -c max_replication_slots=4 
      -c max_wal_senders=4
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CRYPTO_USER:-postgres} -d ${CRYPTO_DBNAME:-db_crypto}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped
    networks:
      - ingestion_net

  postgres-store:
    image: postgres:16
    container_name: pg_store
    environment:
      POSTGRES_DB: ${STORE_DBNAME:-db_store}
      POSTGRES_USER: ${STORE_USER:-postgres}
      POSTGRES_PASSWORD: ${STORE_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - store_data:/var/lib/postgresql/data
      - ./db_init/store:/docker-entrypoint-initdb.d:ro
    command: >
      postgres 
      -c wal_level=logical 
      -c max_replication_slots=4 
      -c max_wal_senders=4
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STORE_USER:-postgres} -d ${STORE_DBNAME:-db_store}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped
    networks:
      - ingestion_net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - ingestion_net
    depends_on:
      - postgres-crypto
      - postgres-store
    restart: unless-stopped
  
  ingestion:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ingestion_service
    environment:
      CRYPTO_HOST: postgres-crypto
      CRYPTO_PORT: 5432
      CRYPTO_DBNAME: ${CRYPTO_DBNAME:-db_crypto}
      CRYPTO_USER: ${CRYPTO_USER:-postgres}
      CRYPTO_PASSWORD: ${CRYPTO_PASSWORD:-secret}
      STORE_HOST: postgres-store
      STORE_PORT: 5432
      STORE_DBNAME: ${STORE_DBNAME:-db_store}
      STORE_USER: ${STORE_USER:-postgres}
      STORE_PASSWORD: ${STORE_PASSWORD:-secret}
      LOG_LEVEL: INFO
      BINANCE_WS_URL: wss://stream.binance.com:9443/ws/btcusdt@trade
      FAKESTORE_API_URL: https://fakestoreapi.com/products
    volumes:
      - ./ingestion_service:/app/ingestion_service:ro
      - ./.env:/app/.env:ro
    depends_on:
      postgres-crypto:
        condition: service_healthy
      postgres-store:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 768M 
          cpus: '1.0'
        reservations:
          memory: 256M 
          cpus: '0.25'
    restart: unless-stopped
    networks:
      - ingestion_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


volumes:
  crypto_data:
    driver: local
  store_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  ingestion_net:
    driver: bridge