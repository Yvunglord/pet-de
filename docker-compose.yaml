services:
  
  postgres-crypto:
    image: postgres:16
    container_name: pg_crypto
    environment:
      POSTGRES_DB: ${CRYPTO_DBNAME:-db_crypto}
      POSTGRES_USER: ${CRYPTO_USER:-postgres}
      POSTGRES_PASSWORD: ${CRYPTO_PASSWORD:-postgres}
    ports:
      - "5434:5432"
    volumes:
      - crypto_data:/var/lib/postgresql/data
      - ./db_init/crypto:/docker-entrypoint-initdb.d:ro
    command: >
      postgres 
      -c wal_level=logical 
      -c max_replication_slots=4 
      -c max_wal_senders=4
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CRYPTO_USER:-postgres} -d ${CRYPTO_DBNAME:-db_crypto}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped
    networks:
      - ingestion_net

  postgres-store:
    image: postgres:16
    container_name: pg_store
    environment:
      POSTGRES_DB: ${STORE_DBNAME:-db_store}
      POSTGRES_USER: ${STORE_USER:-postgres}
      POSTGRES_PASSWORD: ${STORE_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - store_data:/var/lib/postgresql/data
      - ./db_init/store:/docker-entrypoint-initdb.d:ro
    command: >
      postgres 
      -c wal_level=logical 
      -c max_replication_slots=4 
      -c max_wal_senders=4
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STORE_USER:-postgres} -d ${STORE_DBNAME:-db_store}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped
    networks:
      - ingestion_net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - ingestion_net
    depends_on:
      - postgres-crypto
      - postgres-store
    restart: unless-stopped
  
  ingestion:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ingestion_service
    environment:
      CRYPTO_HOST: postgres-crypto
      CRYPTO_PORT: 5432
      CRYPTO_DBNAME: ${CRYPTO_DBNAME:-db_crypto}
      CRYPTO_USER: ${CRYPTO_USER:-postgres}
      CRYPTO_PASSWORD: ${CRYPTO_PASSWORD:-secret}
      STORE_HOST: postgres-store
      STORE_PORT: 5432
      STORE_DBNAME: ${STORE_DBNAME:-db_store}
      STORE_USER: ${STORE_USER:-postgres}
      STORE_PASSWORD: ${STORE_PASSWORD:-secret}
      LOG_LEVEL: INFO
      BINANCE_WS_URL: wss://stream.binance.com:9443/ws/btcusdt@trade
      FAKESTORE_API_URL: https://fakestoreapi.com/products
    volumes:
      - ./ingestion_service:/app/ingestion_service:ro
      - ./.env:/app/.env:ro
    depends_on:
      kafka-connect:
        condition: service_healthy
      postgres-crypto:
        condition: service_healthy
      postgres-store:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 768M 
          cpus: '1.0'
        reservations:
          memory: 256M 
          cpus: '0.25'
    restart: unless-stopped
    networks:
      - ingestion_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    hostname: kafka
    environment:
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_HEAP_OPTS: -Xmx512M -Xms512M
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '1.0'
    restart: unless-stopped
    networks:
      - ingestion_net

  kafka-connect:
    image: debezium/connect:2.7.0.Final
    container_name: kafka_connect
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      PLUGIN_PATH: /kafka/plugins
      HEAP_OPTS: -Xmx512M -Xms512M
    ports:
      - "8083:8083"
    volumes:
      - ./connectors/postgresql:/kafka/plugins/postgresql
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '1.0'
    restart: unless-stopped
    networks:
      - ingestion_net

  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: kafdrop
    environment:
      KAFKA_BROKERCONNECT: kafka:9092
      JVM_OPTS: -Xms256M -Xmx256M
    ports:
      - "9000:9000"
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 384M
    restart: unless-stopped
    networks:
      - ingestion_net

volumes:
  crypto_data:
    driver: local
  store_data:
    driver: local
  kafka_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  ingestion_net:
    driver: bridge