x-airflow-common:
  &airflow-common
  image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:3.1.7}
  # build: .
  env_file:
    - ${ENV_FILE_PATH:-.env}
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres-airflow/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-}
    AIRFLOW_CONFIG: '/opt/airflow/config/airflow.cfg'
  volumes:
    - ${AIRFLOW_PROJ_DIR:-.}/dags:/opt/airflow/dags
    - ${AIRFLOW_PROJ_DIR:-.}/logs:/opt/airflow/logs
    - ${AIRFLOW_PROJ_DIR:-.}/config:/opt/airflow/config
    - ${AIRFLOW_PROJ_DIR:-.}/plugins:/opt/airflow/plugins
  user: "${AIRFLOW_UID:-50000}:0"
  group_add:
    - "999"
  depends_on:
    &airflow-common-depends-on
    redis:
      condition: service_healthy
    postgres-airflow:
      condition: service_healthy
  networks:
    - ingestion_net

services:

  jar-downloader:
    image: alpine:latest
    container_name: jar_downloader
    volumes:
      - ./jars:/jars
      - ./connectors/postgresql:/connectors/postgresql
      - ./ivy_cache:/ivy_cache
      - ./checkpoints:/checkpoints
    command: >
      sh -c "
        apk add --no-cache curl &&
        mkdir -p /jars /connectors/postgresql /ivy_cache /checkpoints &&
        chmod 777 /ivy_cache /checkpoints &&            # Даём полные права на обе папки
        echo 'Downloading PostgreSQL JDBC driver for Debezium...' &&
        curl -L -o /connectors/postgresql/postgresql.jar https://jdbc.postgresql.org/download/postgresql-42.7.10.jar &&
        echo 'Downloading ClickHouse JDBC driver for Spark...' &&
        curl -L -o /jars/clickhouse-jdbc-0.9.6-all.jar https://github.com/ClickHouse/clickhouse-jdbc/releases/download/v0.9.6/clickhouse-jdbc-0.9.6-all.jar &&
        echo 'Downloading PostgreSQL JDBC driver for Spark (optional)...' &&
        curl -L -o /jars/postgresql-42.7.10.jar https://jdbc.postgresql.org/download/postgresql-42.7.10.jar &&
        echo 'All JARs downloaded and directories prepared.'
      "
    restart: "no"
    networks:
      - ingestion_net

  postgres-crypto:
    image: postgres:16
    container_name: pg_crypto
    environment:
      POSTGRES_DB: ${CRYPTO_DBNAME:-db_crypto}
      POSTGRES_USER: ${CRYPTO_USER:-postgres}
      POSTGRES_PASSWORD: ${CRYPTO_PASSWORD:-postgres}
    ports:
      - "5434:5432"
    volumes:
      - crypto_data:/var/lib/postgresql/data
      - ./db_init/crypto:/docker-entrypoint-initdb.d:ro
    command: >
      postgres
      -c wal_level=logical
      -c max_replication_slots=4
      -c max_wal_senders=4
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CRYPTO_USER:-postgres} -d ${CRYPTO_DBNAME:-db_crypto}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped
    networks:
      - ingestion_net

  postgres-store:
    image: postgres:16
    container_name: pg_store
    environment:
      POSTGRES_DB: ${STORE_DBNAME:-db_store}
      POSTGRES_USER: ${STORE_USER:-postgres}
      POSTGRES_PASSWORD: ${STORE_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - store_data:/var/lib/postgresql/data
      - ./db_init/store:/docker-entrypoint-initdb.d:ro
    command: >
      postgres
      -c wal_level=logical
      -c max_replication_slots=4
      -c max_wal_senders=4
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STORE_USER:-postgres} -d ${STORE_DBNAME:-db_store}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped
    networks:
      - ingestion_net

  postgres-airflow:
    image: postgres:16
    container_name: pg_airflow
    environment:
      POSTGRES_DB: ${AIRFLOW_DBNAME:-airflow}
      POSTGRES_USER: ${AIRFLOW_USER:-airflow}
      POSTGRES_PASSWORD: ${AIRFLOW_PASSWORD:-airflow}
    volumes:
      - postgres-airflow-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always
    networks:
      - ingestion_net

  redis:
    image: redis:7.2-bookworm
    expose:
      - 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s
    restart: always
    networks:
      - ingestion_net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - ingestion_net
    depends_on:
      - postgres-crypto
      - postgres-store
    restart: unless-stopped

  ingestion:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ingestion_service
    environment:
      CRYPTO_HOST: postgres-crypto
      CRYPTO_PORT: 5432
      CRYPTO_DBNAME: ${CRYPTO_DBNAME:-db_crypto}
      CRYPTO_USER: ${CRYPTO_USER:-postgres}
      CRYPTO_PASSWORD: ${CRYPTO_PASSWORD:-secret}
      STORE_HOST: postgres-store
      STORE_PORT: 5432
      STORE_DBNAME: ${STORE_DBNAME:-db_store}
      STORE_USER: ${STORE_USER:-postgres}
      STORE_PASSWORD: ${STORE_PASSWORD:-secret}
      LOG_LEVEL: INFO
      BINANCE_WS_URL: wss://stream.binance.com:9443/ws/btcusdt@trade
      FAKESTORE_API_URL: https://fakestoreapi.com/products
    volumes:
      - ./ingestion_service:/app/ingestion_service:ro
      - ./.env:/app/.env:ro
    depends_on:
      kafka-connect:
        condition: service_healthy
      postgres-crypto:
        condition: service_healthy
      postgres-store:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.25'
    restart: unless-stopped
    networks:
      - ingestion_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    hostname: kafka
    environment:
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_HEAP_OPTS: -Xmx512M -Xms512M
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '1.0'
    restart: unless-stopped
    networks:
      - ingestion_net

  connector-setup:
    image: curlimages/curl:latest
    container_name: connector_setup
    depends_on:
      kafka-connect:
        condition: service_healthy
    networks:
      - ingestion_net
    volumes:
      - ./connectors:/connectors:ro
    command: >
      /bin/sh -c "
      echo 'Waiting for Kafka Connect to be ready...';
      sleep 10;
      echo 'Registering crypto connector...';
      curl -X POST -H 'Content-Type: application/json' --data @/connectors/config/crypto-connector.json http://kafka-connect:8083/connectors || echo 'Failed to register crypto connector';
      echo 'Registering store connector...';
      curl -X POST -H 'Content-Type: application/json' --data @/connectors/config/store-connector.json http://kafka-connect:8083/connectors || echo 'Failed to register store connector';
      echo 'Connector setup completed.';
      "
    restart: "no"

  kafka-connect:
    image: debezium/connect:2.7.0.Final
    container_name: kafka_connect
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      PLUGIN_PATH: /kafka/plugins
      HEAP_OPTS: -Xmx512M -Xms512M
    ports:
      - "8083:8083"
    volumes:
      - ./connectors/postgresql:/kafka/plugins/postgresql
    depends_on:
      kafka:
        condition: service_healthy
      jar-downloader:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '1.0'
    restart: unless-stopped
    networks:
      - ingestion_net

  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: kafdrop
    environment:
      KAFKA_BROKERCONNECT: kafka:9092
      JVM_OPTS: -Xms256M -Xmx256M
    ports:
      - "9000:9000"
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 384M
    restart: unless-stopped
    networks:
      - ingestion_net

  clickhouse:
    image: clickhouse/clickhouse-server:head
    container_name: clickhouse
    environment:
      CLICKHOUSE_DB: dwh
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: secret
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
      - "9001:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./db_init/clickhouse:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: '1.5'
    restart: unless-stopped
    networks:
      - ingestion_net
    depends_on:
      kafka:
        condition: service_healthy

  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}" || celery --app airflow.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      <<: *airflow-common-env
      DUMB_INIT_SETSID: "0"
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-apiserver:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        if [[ -z "${AIRFLOW_UID}" ]]; then
          echo
          echo -e "\033[1;33mWARNING!!!: AIRFLOW_UID not set!\e[0m"
          echo "If you are on Linux, you SHOULD follow the instructions below to set "
          echo "AIRFLOW_UID environment variable, otherwise files will be owned by root."
          echo "For other operating systems you can get rid of the warning with manually created .env file:"
          echo "    See: https://airflow.apache.org/docs/apache-airflow/stable/howto/docker-compose/index.html#setting-the-right-airflow-user"
          echo
          export AIRFLOW_UID=$$(id -u)
        fi
        one_meg=1048576
        mem_available=$$(($$(getconf _PHYS_PAGES) * $$(getconf PAGE_SIZE) / one_meg))
        cpus_available=$$(grep -cE 'cpu[0-9]+' /proc/stat)
        disk_available=$$(df / | tail -1 | awk '{print $$4}')
        warning_resources="false"
        if (( mem_available < 4000 )) ; then
          echo
          echo -e "\033[1;33mWARNING!!!: Not enough memory available for Docker.\e[0m"
          echo "At least 4GB of memory required. You have $$(numfmt --to iec $$((mem_available * one_meg)))"
          echo
          warning_resources="true"
        fi
        if (( cpus_available < 2 )); then
          echo
          echo -e "\033[1;33mWARNING!!!: Not enough CPUS available for Docker.\e[0m"
          echo "At least 2 CPUs recommended. You have $${cpus_available}"
          echo
          warning_resources="true"
        fi
        if (( disk_available < one_meg * 10 )); then
          echo
          echo -e "\033[1;33mWARNING!!!: Not enough Disk space available for Docker.\e[0m"
          echo "At least 10 GBs recommended. You have $$(numfmt --to iec $$((disk_available * 1024 )))"
          echo
          warning_resources="true"
        fi
        if [[ $${warning_resources} == "true" ]]; then
          echo
          echo -e "\033[1;33mWARNING!!!: You have not enough resources to run Airflow (see above)!\e[0m"
          echo "Please follow the instructions to increase amount of resources available:"
          echo "   https://airflow.apache.org/docs/apache-airflow/stable/howto/docker-compose/index.html#before-you-begin"
          echo
        fi
        echo
        echo "Creating missing opt dirs if missing:"
        echo
        mkdir -v -p /opt/airflow/{logs,dags,plugins,config}
        echo
        echo "Airflow version:"
        /entrypoint airflow version
        echo
        echo "Files in shared volumes:"
        echo
        ls -la /opt/airflow/{logs,dags,plugins,config}
        echo
        echo "Running airflow config list to create default config file if missing."
        echo
        /entrypoint airflow config list >/dev/null
        echo
        echo "Files in shared volumes:"
        echo
        ls -la /opt/airflow/{logs,dags,plugins,config}
        echo
        echo "Change ownership of files in /opt/airflow to ${AIRFLOW_UID}:0"
        echo
        chown -R "${AIRFLOW_UID}:0" /opt/airflow/
        echo
        echo "Change ownership of files in shared volumes to ${AIRFLOW_UID}:0"
        echo
        chown -v -R "${AIRFLOW_UID}:0" /opt/airflow/{logs,dags,plugins,config}
        echo
        echo "Files in shared volumes:"
        echo
        ls -la /opt/airflow/{logs,dags,plugins,config}

    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
      _PIP_ADDITIONAL_REQUIREMENTS: ''
    user: "0:0"

  airflow-cli:
    <<: *airflow-common
    profiles:
      - debug
    environment:
      <<: *airflow-common-env
      CONNECTION_CHECK_MAX_COUNT: "0"
    command:
      - bash
      - -c
      - airflow
    depends_on:
      <<: *airflow-common-depends-on

  flower:
    <<: *airflow-common
    command: celery flower
    profiles:
      - flower
    ports:
      - "5555:5555"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:5555/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  spark-master:
    image: apache/spark:3.5.4
    container_name: spark-master
    ports:
      - "8081:8080"
      - "7077:7077"
    volumes:
      - ./jobs:/opt/spark/work-dir/jobs
      - ./jars:/opt/spark/work-dir/jars
      - ./checkpoints:/opt/spark/work-dir/checkpoints
    networks:
      - ingestion_net
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      - SPARK_NO_DAEMONIZE=true

  spark-worker:
    image: apache/spark:3.5.4
    container_name: spark-worker
    depends_on:
      - spark-master
    volumes:
      - ./jobs:/opt/spark/work-dir/jobs
      - ./jars:/opt/spark/work-dir/jars
      - ./checkpoints:/opt/spark/work-dir/checkpoints
    networks:
      - ingestion_net
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
      - SPARK_NO_DAEMONIZE=true

  spark-streaming:
    image: apache/spark:3.5.4
    container_name: spark-streaming
    depends_on:
      spark-master:
        condition: service_started
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      jar-downloader:
        condition: service_completed_successfully
      connector-setup:
        condition: service_completed_successfully
    volumes:
      - ./jobs:/opt/spark/work-dir/jobs:ro
      - ./jars:/opt/spark/work-dir/jars:ro
      - ./checkpoints:/opt/spark/work-dir/checkpoints
      - ./ivy_cache:/home/spark/.ivy2:rw
    networks:
      - ingestion_net
    restart: unless-stopped
    command: >
      /opt/spark/bin/spark-submit
      --jars /opt/spark/work-dir/jars/clickhouse-jdbc-0.9.6-all.jar
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.4
      --master spark://spark-master:7077
      --conf spark.sql.shuffle.partitions=4
      --conf spark.streaming.stopGracefullyOnShutdown=true
      --conf spark.jars.ivy=/home/spark/.ivy2
      --driver-memory 1g
      --executor-memory 1g
      /opt/spark/work-dir/jobs/oltp_to_clickhouse.py
      bronze_crypto_trades
      "jdbc:clickhouse://clickhouse:8123/?database=default"
      default
      secret
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  crypto_data:
    driver: local
  store_data:
    driver: local
  postgres-airflow-db-volume:
    driver: local
  kafka_data:
    driver: local
  pgadmin_data:
    driver: local
  clickhouse_data:
    driver: local
  ivy_cache:
    driver: local

networks:
  ingestion_net:
    driver: bridge
